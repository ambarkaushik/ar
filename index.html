<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>14 Marker AR Gallery</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script>
AFRAME.registerComponent('spin', {
    tick: function () {
        this.el.object3D.rotation.y += 0.01;
    }
});
</script>

<style>
body{
    margin:0;
    overflow:hidden;
}
</style>
</head>

<body>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Marker 1 -->
    <a-marker type="pattern" url="https://raw.githubusercontent.com/ambarkaushik/ar/main/marker1.patt">
        <a-entity
            gltf-model="https://raw.githubusercontent.com/ambarkaushik/ar/main/1.glb"
            position="0 0.5 0"
            scale="0.5 0.5 0.5"
            animation="property: position; dir: alternate; dur:2000; easing:easeInOutSine; loop:true; to:0 0.8 0"
            spin>
        </a-entity>
    </a-marker>

    <!-- Marker 2 -->
